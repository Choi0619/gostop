services:
  - type: web
    name: gostop
    runtime: node
    plan: free
    buildCommand: cd client && npm ci && npm run build && cd ../server && npm ci
    startCommand: node server/index.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gostop-db
          property: connectionString

databases:
  - name: gostop-db
    plan: free
